version: "3.8"

services:
    postgres:
        image: postgres:15-alpine
        container_name: honda_db
        restart: always
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: rootpassword
            POSTGRES_DB: honda_parts
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        container_name: honda_pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@honda.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - postgres

volumes:
    postgres_data:
